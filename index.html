<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>BeerCycle</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta
      name="description"
      content="A Paperboy-style arcade ride through Boulder's breweries. Pedal between taprooms, knock a few back, and try to keep it between the ditches."
    />

    <!-- Open Graph / Twitter share card. Image URLs must be absolute for
         scrapers, so they hardcode the production /beercycle/ origin. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BeerCycle" />
    <meta property="og:title" content="BeerCycle — a Boulder bicycle odyssey" />
    <meta
      property="og:description"
      content="A Paperboy-style arcade ride through Boulder's breweries. Pedal between taprooms, knock a few back, and try to keep it between the ditches."
    />
    <meta property="og:url" content="https://guifreelife.com/beercycle/" />
    <meta property="og:image" content="https://guifreelife.com/beercycle/og.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Pixel-art BeerCycle logo over dusk Flatirons with two cyclists flanking a frothy beer mug" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BeerCycle — a Boulder bicycle odyssey" />
    <meta
      name="twitter:description"
      content="A Paperboy-style arcade ride through Boulder's breweries. Pedal responsibly — it's a video game."
    />
    <meta name="twitter:image" content="https://guifreelife.com/beercycle/og.png" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #1a1423;
        height: 100%;
        touch-action: none;
        overscroll-behavior: none;
      }
      #game {
        width: 100vw;
        height: 100vh;
      }
      canvas {
        image-rendering: pixelated;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
